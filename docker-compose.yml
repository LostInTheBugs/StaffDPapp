services:
  backend:
    build: ./backend
    container_name: sd-backend
    restart: unless-stopped
    environment:
      - SD_DATABASE_URL=sqlite:///./data/staff_delegation.db
      - SD_SECRET_KEY=${SD_SECRET_KEY:-change-me-in-production}
    volumes:
      - sd-data:/app/data
    networks:
      - sd-net

  frontend:
    build: ./frontend
    container_name: sd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sd-net
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sd-web.rule=Host(`staffdpapp.cloudfr.net`)"
      - "traefik.http.services.sd-web.loadbalancer.server.port=80"

volumes:
  sd-data:

networks:
  sd-net:
  traefik-public:
    external: true
